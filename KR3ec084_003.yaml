body:
  text: 大茴香鑑別法呈淡褐色形肥大成整然之八角形各房之腹縫少破裂內部有淡褐色之種子富油分香氣高者為上倘系黑褐色或各房片片離解或腹縫不閉小而瘠者普通品也調製法指尖將八角形之覆果一一剝離之大楓子鑑別法褐色而有光澤圓而粒大者為上帶暗色或粒小者無用調製法去皮殼而用其實之白之部分大戟鑑別法有綿大戟與紫大戟一名紅芽大戟二種綿大戟質甚柔軟以手觸之無異於綿外皮紫黑色內部呈茶褐也最大者味極苦良品也紫大戟長七八寸較之綿大戟為小外皮紫赤色少苦味辛味為一般應用之物調製法水中浸軟去其木心蘆頭根端等壓切之大棗鑑別法外面呈赤色皺紋少內部有黃白色之小核果肉多試以指壓之覺有彈力粒大者上品也多堅硬之皺果肉少者無用其形狀有圖形長形之分而以圖形者為佳調製法壓而不去其核橫切為二或用兩手碎之亦佳代赭石鑑別法有光澤之紫赤色質硬外面有大瘤破之成片片之大塊者上品也稱丁頭代赭形小而軟易碎而如土塊者下品也調製法火燒赤浸於醋中又燒過三次反復冷後粉用之桃仁鑑別法褐色之皮膜成橢圓形肥而大仁尖白者上品也外面呈暗褐色或形瘠者無用此又有桃仁梅仁杏仁等之區別桃仁扁平而長有皺梅仁圓而尖杏仁較梅仁為大圓而微皺古昔用之調製法普通用小刀橫切為二桃仁有皮宜注以熱湯暫時放置將指尖除其褐衣乾用之當藥鑑別法開無數之花附著全草經久不落葉多經過二年之品一望而見其為褐色而長大者為良短而如矮腳雞式者亦佳長而色相黑者次品也新貨帶青味其值廉故往往有投入沸湯日光中干之製為色相古雅之僞品者然苦味已脫而味甚薄以手觸之硬軟之度判然大者三枚為一袋形高嵩者為上調製法民間藥應用者極少去其莖採取其花與葉藥研粉細之為賣藥之原料用當歸鑑別法冬令掘其根永貯於無蟲之所在半乾後入熱湯中經少許時取出就日光中干之此宜選其肥而大鬚根叢生如馬尾外皮褐色內部黃白色味始稍甘後稍辛香與潤者為佳所謂馬尾當歸是也又野生之品因培養品缺乏故瘦而小其味始辛後甘辛味甚強故效能甚多從前專用此物現在坊間所售者有大深當歸與天上當歸二種大深當歸産自大深屬日本紀州鬚根直而多當歸之上等者也天上當歸産於日本中部鬚根彎曲不正其附著亦極疏質硬此下等品也又古醫書中有所謂歸尾者即馬尾當歸之尾所謂鬚根是也調製法火炙軟去其蘆頭縱間施以二三條之截痕從根元至尾薄薄切之或切為小角塊本品極易蟲蝕故宜常添樟腦入木箱中密閉之澤蘭鑑別法小澤蘭莖為方形節之距離短葉有毛茸而新者為上調製法莖與葉切之澤瀉鑑別法球圓形之肥而大身分重外部黃白色內部白色新而無蟲穴者為上內部淡黃色者無用調製法壓後用小刀割之其割裂面宜上向將稍強之火熱炙即乘其時切之膽礬鑑別法有生礬熟礬二種藥用者稱生礬用其天然産物火燒而不出汁成不整之塊大者如拳小者如桃栗有圓錐狀之結晶塊者為佳火燒後汁已出呈深藍色者名熟礬俗呼煮膽礬供外用調製法用乳鉢研為極細之末目的如用為吐劑則內服者須與酒同下在萬病回春之中風條中有用膽礬一分為末溫黃酒調下云云黃酒者米釀之酒也羚羊角鑑別法羚羊角之大恰如竹之根節其尖端一二寸之所在為最上等其次則為節處外屑之部分內部髓質之處色相以飴色者為上調製法用鮫皮磨為粉或用研磨細之貯藏之法應在不透風之處用幾層紙包包裹之或用瓷罐或用桐箱密閉保存之連翹鑑別法兩片不離新而大粒呈褐色者為佳小者暗色者無用入袋時有無數種子混入者不效調製法置於平之板上兩手用刃除去其子或在石上輕敲使種子離去蓮房鑑別法新而無蟲者為上調製法火後切之或兩手碎之蓮實鑑別法熟後如石之硬黑色而大者為良調製法以鐵槌破其皮谷採其仁為配劑用蓮肉與蓮之調製法同蓮葉鑑別法淡褐色而有新氣者為佳暗褐色或破碎者無用調製法兩手碎之蓮蕊鑑別法蓮花之蕊陰乾者以新者為上調製法切為二三分長蘇方木鑑別法外皮白色內部之木心呈深紅色者為上呈黃赤色者嫩木也無用調製法除去粗皮不用火就木板切之蘇合香鑑別法呈灰褐色以棒搗之有黏氣而無澤者為上調製法重湯煎熱加香附子末攪拌之加以煉蜜成為適當之稠度貯藏之又以蘇合香沉香白檀等及揮發性之物配合為丸藥附以蠟殼其調製法大約四格蘭姆之大丸一粒外包紙包投入熔煬之蠟殼內使用時將蠟殼剝開同時剝開包紙其丸藥加入煎藥中服用之蘇合香丸用法云每丸重一錢用蠟包裹每用大人一丸小兒半丸去蠟皮云云象牙鑑別法印度象之門齒形長大色淡黃灰白調製法磨粉不用水調象牙為拔除鐵屑或竹木刺之特效藥故昔時無內服者側柏葉鑑別法味苦而香氣高色青青有新氣者為上失香氣者已經陳久者也無用調製法取其軸之葉兩手碎之側柏子鑑別法較胡麻稍大之淡黃色之種子味苦而放微香者為上調製法稍稍炒用之續斷鑑別法真者細而味甘見心中有粉塵飛散者為上近來市場中所售之續斷皆系南續斷即大薊之根味苦而有長大之分歧根其大而堅之宿根尚可用新根而軟者無用調製法暫浸於水取出放置二十分鐘軟後切之續隨子鑑別法粒大而無藁屑身分重者為上調製法鋪於板上壓而磨之去皮得白之實與巴豆同法用紙包去油用之獺肝鑑別法新者帶藍黑色分裂為七葉干後變為暗黑色其分裂數亦不分明惟分裂數必須認明若系八葉必系肺臟故宜選其七葉者調製法炮烙炒黑成粉用之雷丸鑑別法外皮黑褐色或栗褐色處處有凹窩成顆粒狀之塊枯後肌細而硬者為上又內部呈白色者名白雷丸極上品也內部黑色或質軟者無用調製法除皮火後切之絡石鑑別法採其纏於石上蔓生之莖與葉日光中曬乾之根白者為上調製法火後切之蘿蔔子鑑別法實重者為上調製法稍稍炒用之無患皮鑑別法黃褐色大而新者為上暗褐色或形小者無用本品為庭園中驅除蚯蚓之劑若散布其煎液則蚯蚓一一現出地面可一一捕取而除之無名異鑑別法有光澤色黑褐而形圓者為上形如粟粒或砂之小物無用調製法細細搗碎調水用之烏梅鑑別法極深黑色味酸者為上燻黑之物無用調製法去其內部之核取其肉質之部分火炙後壓而薄切之烏頭鑑別法形如薤白之大皮黑而內部白者上品也此品産自川蜀故又稱川烏頭産自日本者形如棐實之大蘿蔔狀下部漸次細小色白如角質狀此係次品調製法浸於水中二三小時然後以小刀切為小角塊又如火炙後切之亦佳烏藥鑑別法兩端尖中部膨隆外部呈赤揭色內部呈白色者為上等品因其恰如八月中之芋奶故又名芋烏藥其他暗褐色或形大者或如棒之細長者均屬劣品調製法浸於水中夏令一晝夜冬令四五日取出去其水氣以稍強之火炙之然後壓而薄切之烏蛇鑑別法頭圓體漆色而放光澤背面有三稜尾端甚細而長此為真品頭在中心圓座成一圖形者亦屬上等品雖未碎而形如木枝或如串形者次品也暗色而碎或無鱗者無用調製法與白蛇同禹餘糧鑑別法禹餘糧繫帶黃黑褐色之卵形或橢圓形之圓塊內部空洞其中殘留之粉塊呈白色或青色者系藥用良品黃色或褐色者名太一餘糧其外殼有石片及砂礫膠著內部有灰白色或黃褐色之粉塊此亦可以為藥用代用品此外尚有卵白黃者為灰白色之卵形質軟碎其外殼則內部包藏紫色之土塊此下品也調製法細碎後調水用之雲母鑑別法白如銀色質潤者為佳淡黃色或無光澤者無用調製法水濕後日光中曬乾之用火炒至變色用之瞿麥子鑑別法色黑而有光澤實重者為佳入袋後覺不嵩而低者亦佳調製法除其藁屑土砂然後使用瓜呂仁鑑別法皮殼褐色成橢圓形而扁大者為佳此名附皮瓜呂仁其除去皮殼者名瓜呂實價值稍高調製法壓於臺之邊緣以左手之食指與拇指挾住附皮瓜呂仁右手以木製之小槌輕輕在瓜呂仁長徑之側邊敲打之敲打適當則皮殼脫去扁圓形之仁現出矣此即可以為配劑之用大抵附皮瓜呂仁一斤僅可得瓜呂實七兩即十六分之七瓜呂根鑑別法形狀及大如香砂芋剝皮後肉面少凹凸重而滑色白中心有花紋者為真品其色不白且瘠而小亦不滑澤筋多中空者無用調製法削去粗皮水浸四日壓切為小角塊或切為四分平方形之薄塊瓜蒂鑑別法採於未熟之時苦味多而新者為佳其熟後採者苦味少者經年而失氣味者均無用瓜蒂在昔盛用為吐劑內服之可嘔吐如服後無嘔吐之象時飲冷水或冷粥少許調製法應用於瓜蒂散者研為粉末用之滑石鑑別法色白而有真珠之光澤微甘滑而軟者為上帶土臭之味無光澤呈硬而淡紅色或淡緑色者無用調製法其初用石臼舂碎其次用乳鉢磨研為細粉再加入水充分干後用之蝸牛鑑別法小者效力微弱故宜選其大者調製法煏為灰用之藿香鑑別法根元有力莖大其附生之葉大而帶青者為上此有一番二番之別一番者刈取新莖之葉也葉莖均柔而不縮上品也二番者從一番之株上所發之新芽之莖刈取之葉扁大而硬莖不大者次品也又有不採自莖而僅集其落葉者苟其葉帶青色不沾泥香氣佳者亦佳調製法入於籠中其上加如露之水暫時放置軟化後切為三分長又嘔吐時服用者往往即用其枝保中湯之君藥即以藿香梗為主者也若無梗即用其枝或葉亦佳因其藥性相同故也鶴蝨鑑別法此係乎形科之植物以其形狀如蝨故名色黑而大者為良然無驅除寄生蟲之效日本市場所售之物屬於菊科十月間採其子實名和鶴蝨以黑褐色者為上調製法除蒂稍炒用之款冬花鑑別法半開之花蕾無土氣而新者為上調製法兩手扯碎之款冬根鑑別法呈紫黑色長而大者上品也調製法水洗後暫放置壓而切之苦楝皮鑑別法從前根皮不供藥用現今則市場上皆用樹皮矣以少褐色之外皮而有黃色之內皮平而大者為上調製法火後壓之縱斷之約五分長苦辛鑑別法外皮黃褐色內部黃白色有強苦味節不長者為上肥大或過細或色相濃者無用調製法火後壓之切之射干鑑別法外部黃褐色內部白色上面有無數之葉痕新而大者為良調製法火後切之陽起石鑑別法有光澤色白而軟有束緘狀之紋理者為上淡緑色或質硬者無用調製法火燒後浸於酒醋中反復七次細碎為粉水調之益智鑑別法實大而粒色新香氣高者為上色帶黑或香氣少或帶稠或粒小者無用調製法兩手碎之從前調製之法去殼入於布袋中以手揉碎之棄其隔層之物稍稍炒用之益母草鑑別法益母草屬唇形科植物採其全草陰乾之帶青味而新者為上調製法莖葉花根有同一效能一起用手握壓於臺上用刀切之夜明砂鑑別法比鼠糞稍小兩端尖色黑褐者為上多土氣者無用調製法就水中淘去其砂與蚊眼之物日光中曬乾後炒用之玫瑰花鑑別法色新而帶淡黃褐色者為上已變為濃褐色或有蟲蝕氣象者無用調製法去其蔓切之麻黃鑑別法淡緑色味澀就口中咀嚼之舌上覺麻痹色澤青青而新者為上此名立麻黃其切為長約五分左右之物者名切麻黃其色已變黃或香氣已失或貯入袋中袋底有砂粒氣象者無用調製法現今往往用兩手拍去微塵用之蔓荊子鑑別法粗大而新者為上調製法用手剝落其上之白皮稍稍炒用之荊芥鑑別法用花穗而不帶莖者為上調製法稍炒就藥研粉碎用之雞冠石鑑別法有光澤呈赤色不帶臭氣硬而重成大塊者為上色黃赤臭氣甚者次品也青黑色者屬劣等調製法天然之物不含毒性供內用者宜撮去其夾雜之石研細一度水調用之從前調製之法將粗碎之物絞為汁加酥煮後干之研細調水用之輕粉鑑別法色白而有真珠狀之光澤結晶粗而身輕者為上調製法水調用之桂枝鑑別法皮薄而有三四分之廣者或皮嫩者祗須色相為紫黑色辛而甘香氣高者均屬良品調製法暫浸水中取出後待其水分滲入以左手握之切為三分長之物決明子鑑別法有光澤大而色黑者為佳此為民間消毒之妙藥可以為外用近來有以蔞蒿稱決明子者蔞蒿者青葙子之異名也故稱草決明而決明之決明子當以稱馬蹄決明為當二者有甚大之區別焉李時珍本草綱目解釋云此馬蹄決明也以明目之功而名又有草決明石決明皆同功者草決明即青葙子陶氏所謂蔞蒿是也調製法兩手碎之
