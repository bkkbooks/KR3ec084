front:
  text: 自序近時和漢藥之研究熱大盛上之最高學府之諸大教授下至一介業藥之夫莫不孳孳焉從事於此而對於餘十餘年前所著之和漢藥良否鑑別法及調製法一書再四促余再刊因利用寸晷之暇從事增訂本年四月漸次成稿較諸前版增加品目百七十紙數百三十五雖尚未脫小冊子之領域而易於領會其要領不無較龐大之書籍為優此則大堪注意之事即如其他三品五味相畏相惡相反十劑等難解事項亦一見便明自信有裨於斯業者不鮮少云昭和四年六月一色直太郎志
  hash: sha256:f9073c82c8dbcaab80779cbeb3104eb3c287690fa5af606f4b474d8e63204423
