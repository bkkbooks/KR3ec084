body:
  text: 凡例一本書供日常業務繁劇者之瀏覽使其對於藥物一見即能鑑別其良否真贋而得舉其特徵且明瞭其調製之法非所以供高雅明達者之參考故語言不避卑俗行文不忌口語二本書大別為總論各論二編總論述鑑別調製等必要事項之心得各論為鑑別法憑作者平日之實驗外並引用許多書籍參酌適宜而排比之且注意適宜於現代之藥業界至於調製方法則除略略參酌成書外以編者之實驗為多三品目之排列依日本字音排列之四藥品以現今市場一般通用之名稱為限五卷未詳述和漢藥之調合法及三品君臣佐使五味六陳八新禁忌七情十劑等皇漢藥學研究上必要之事項以資參考六本書初版中曾列記指正諸公之臺銜為小泉榮次郎氏並和藥嘉兵衛氏世良田龜次郎氏中井德藏氏前川武義氏西村小兵衛氏阪田嘉兵衛氏諸先生之芳名茲再舉諸氏姓名以示深深感謝之意七本書初版中所有遺漏及錯誤之處今悉已改正惟仍難保其不無錯誤遺漏當於改版時再行訂正八本書不能附加處方式例殊為遺憾然目下美歐藥報社因應時代之需要連日登載漢洋比較處方將每一次之服量藥劑之作用記述甚詳讀者可以隨時參考無唐本書之贅述矣陳存仁按原書尚有日本藥如又度萬貞鹿山歸來等藥品今因無關中國醫藥家之應用故概行刪去緒言鑑別漢藥之良否甚屬困難非精通關於生藥上之智識後不能正確區別其良劣鑑定其真僞判斷其新陳確定其價值昂廉本書備日常從事於繁劇業務之人得有具體之智識僅就形狀色澤香氣等次俾一經過目即能區別其藥品之良與不良而記述之大旨亦祗以用如何之方法細銼如何之形狀系如何之調製服用之後對於患者生如何之快感為度至於化學的鑑別法則應讓諸專門書籍悉從省略也漢藥良否之鑑別昔陶弘景於本草序例中曾言之矣其大意謂衆醫都不識藥惟聽市人市人又不辨究皆委諸採送之家採送之家傳習造作真僞好惡並皆莫測所以細辛水漬使直黃蓍蜜蒸為甜當歸酒灑取潤螵蛸膠著於桑枝皆非所宜俗用既久轉以成法非復可改末如之何又泡製切片儘量剝除如遠志牡丹僅取其半地黃門冬三分耗一凡去皮除心之屬分量皆不復相應病家惟依此用不知更稱取足誠有慨乎言之也至言鑑別之要點則有四端曰形狀色澤香味乾溼度是也一形狀凡物各依其種類而具特有之形狀吾人一見其特徵如何即可判為何物且同一物也因其肥瘠大小長短及有無蟲蝕形態之完全與不完全等亦即能評定其品位之差等焉總之觀察形狀此為鑑別漢藥良否之第一條件二色澤色澤之良否有關於新陳之時效成熟之程度採集及貯藏方法之當與不當此中有大相懸殊之點不可忽視三香味香味之有無與夫香味之良與不良亦可以斷定新陳之程度及貯藏方法之當不當而為確定其品位必要之事項四乾溼度乾燥不足則減其貯藏之時效因含有濕氣則易生黴或曾黴過者也此層亦宜注意威靈仙鑑別法有草本威靈仙與鐵腳威靈仙二種在宋時採草本威靈仙為藥用元明以後則採鐵腳威靈仙為藥用矣鐵腳威靈仙之生者呈帶黃黑色干則呈深黑色其根細而長色相黑而不帶土氣者為佳王藎臣群芳譜云有稜葉似柳葉作層每層有七葉如車輪有三層至七層者調製法水中洗過入於籠中放置一小時許使得水氣而軟就木板切之伊豆縮砂鑑別法外面灰白色內部呈白色香氣強者為新貨佳調製法不必成粉兩次切之硫黃鑑別法硫黃有鷹眼石硫黃鸕鷀石硫赤火口石硫青三種鷹眼者呈鮮黃色鸕鷀呈黃色微帶紅均系藥用上品有光澤者為佳火口用以引點燭火系屬下品亦有青口與黃口二種青口之價稍昂調製法藥用者以鷹眼硫黃研細以水調之萎蕤鑑別法如竹節人參之形狀淡黃色半透映之角質狀味甘而潤者為新貨大者為佳如地黃狀之黃精帶暗黑色或蟲蝕者不可用調製法在火上熏軟就木板切之蝟皮鑑別法表面呈褐色裡面呈白色之毛皮從前僞品甚多宜就毛端之分歧而選定之調製法炒黑就藥研中研為粉末茵陳鑑別法葉極細如絲故名綿茵陳陰乾後呈青色者為貴市中所賣之品往往有結微小之子實或穗者次貨也調製法注意除去藁屑等之混入物始可為藥用淫羊霍鑑別法色青新有葉者為上調製法用水儘量浸之待其軟就木板切之露蜂房鑑別法野蜂之窠其形甚大表面呈黃與黑色有紋多受雨露者為佳調製法碎後用之或用兩手捋碎之鹿角鑑別法淡褐色而小者為佳調製法儘量銼為細末或用火燒後濾為粉使用之鹿角膠鑑別法無色透映或半透映之薄片表面現籠眼狀而不帶不快之臭味者為上調製法與調製之法同鹿胎子鑑別法每匹約價十五六元僞貨甚多真正之物腳長蹄如牛蹄細視便知普通之僞物大抵捕剝鼠皮就日光中乾燥後長貯於少蟲之處或以豚制僞物惟其腳短又有用山羊製為僞物者惟前腳短骨粗大亦易於看破調製法燒為黑灰用之鹿茸鑑別法小而輕且松疏者為良品調製法燃火燒之去其毛茸就木板切之棄其根元之堅者為上爐甘石鑑別法色白而軟且身分輕者為上如微有色素或帶破碎內部見紅色者下品也呈泡狀者貨品最佳此物有如浮石色白而軟故又稱為羊腦爐甘其次者如茶碗狀稍稍堅硬微白而帶紅狀扁平若片稱為片子爐甘劣品則如石狀質極堅硬色相呈淡白色形狀亦不一調製法將爐甘石燒之使赤浸於童便中再取出就火燒之使赤再浸於童便中如此反覆數次就乳鉢中用水溶之最後盛於平底之器內上覆以紙就日光中曬乾之緑礬鑑別法未經酸化而呈青緑色形如紺者為上品呈黃緑色或黃赤色如罐頭物品者下品也入袋宜當心紙袋易腐蝕以緑礬燒之使赤便成絳礬調製法不用醋爆於日光中曬乾後入土製之器物中火燒之使赤有頃取出研粉用之緑青鑑別法藥用之緑青系産自天然之石緑青含有鹽基性炭酸銅故單呼為緑青色淡而不碎呈黑緑色塊狀者為佳其中粗末為最上較細之末次之極細微者又次之又有人工之奈良緑青一名銅緑此係無鹽基性醋酸銅混用之物調製法用乳鉢研細水溶之蘆薈鑑別法色黑而有光澤肌細質堅澀而苦者上品也赤而重如鐵渣成大塊者無用調製法蘆薈之燒法以碎蘆薈入於與蘆薈同樣大之炮烙二枚之中不使氣泄接合處塗以薄土干後於炭火之上敷以厚米糠中埋炮烙火從糠上徐徐燒之待其米糠燒盡取出冷之揭開炮烙取出蘆薈碎而使用之燒蘆薈之燃料如不用米糠必帶不快之臭味此層須要注意蘆根鑑別法不甚大之蘆葦取其土中白色之根以不陳久者為上調製法以水潤之就木板切之貝母鑑別法形似貝外面色白裡面呈黃褐色小者為上如形大而帶膩臭及身輕者無用調製法浸於水中使軟用小刀切為小三角塊或就木板切之巴戟天鑑別法有肉巴戟天與括巴戟天二種肉巴戟天打碎去其木心取出之肉厚而味甘且帶潤者為良括巴戟天連絡如數珠味澀皮部厚而色黑者為良倘形狀如棒而無連珠形態者味雖澀亦屬下品調製法浸於酒中一夜軟後去其木心就木板切之馬鞭草鑑別法採於舊曆六月左右就日光中曬乾之有葉與穗而帶新之色澤者為良調製法儘量壓榨切之巴豆鑑別法有辛烈之味油分多而身重有新之色澤者為上品投入水中毫不浮起調製法除去殼子殼膜子衣心芽胎包以兩三層之白紙用棒搗之使油分吸入於紙更換以新紙再搗之使油分已少入於炮烙中炒之研為粉末使用破故紙鑑別法色黑而香氣高者上品也調製法浸於酒中一夜就日光中乾燥後炒用之防己鑑別法根之形狀似木通皮粗外部呈黑灰色橫切面有菊花狀之紋理內部呈黃褐色者真品也莖曰木防己外皮呈灰色內部呈淡黃色此為其區別之點惟其橫切面亦有菊花紋理故欲辨識莖根僅色素上之區別耳調製法切斷用之防風鑑別法種類甚多外面呈淡黃色內部完善根大如指長一尺六七寸味甘潤者良品也日本江戶防風或稱真防風其根少有屈曲之致長約六七寸呈黃褐色稍帶苦味此因産於砂石土地之故又有名伊吹防風者形如鼠尾長五六寸又因其類似廢筆坊間亦有稱為筆防風者此外尚五鳥防風肥胖如獨活皮粗可削故稱削防風又有濱防風者形狀類似普通防風呈淡褐色味淡從前常用之調製法浸於水中十五分鐘取出入籠暫時放置切之厚約二分就日光乾燥之水浸十五分鐘待軟化後再切之茅根鑑別法色白而長直者良品也帶黃色者不良調製法切之要不失其光澤普通投入水中立即取出滴去水分暫時放置後切成二三分長之物欲其不黴宜就日光中充分曬乾之白扁豆鑑別法色白而實大且重者為良調製法浸於水中去皮干於日中少少炒而用之白頭翁鑑別法形狀似桔梗在褐色之蘆頭上多白毛者為上惟內部腐朽者無用調製法水中洗過放置一小時達切之機會時就木板或椹上切為小角塊又在未浸水以前亦可以用火熏之白花蛇鑑別法脊部有白四角形之方勝紋腹面有圖形之念珠紋紋理鮮明首尾俱完備者上品也除其內臟頭卷在中心圓座成一圓卷而乾者稱之曰平樣不除內臟亦不圓者曰圓樣調製法酒浸二三日軟後取出去骨陰乾之薄荷葉鑑別法葉色青青香氣甚佳大而多者為佳調製法在綺麗之席上將薄荷葉一束一束敷置之以噴霧器如露輕輕沾之待其濕潤後以木板切之其中應慎防藁屑之混入麥芽鑑別法色澤新鮮有微香者為上色古而覺有臭味且有蟲蝕者無用調製法炒後芽粉碎者篩除之而余其不斷者入於淺之袋中飛散其皮膜而使用之蛤貝鑑別法蛤貝昔稱文蛤大一二寸外側面有斑紋者為上我漢法醫好用為文蛤湯倘斑紋不顯明或全無斑紋者效力極劣然用於藥用者亦不少焉調製法石臼搗碎供配伍之用蛤貝有大有小大者一米袋中適容貝數一千名曰千貝小者一袋可容二千稱二千貝又有五錢貝者即每一蛤貝重量約計五錢之謂此可以為膏藥煉藥之用馬錢子番木鱉鑑別法淡灰黃色之光澤圓板狀之大粒者為上調製法埋於熱灰中以粗皮研細為粉斑蝥斑貓鑑別法中國産者形大長一寸闊三分全身之黑翅鞘上有茶褐色與黑色之斑點原系毒物日本産者形小似螢長七八分雌者大而雄者小翅鞘有黃色與紅色之斑點擇其大而新且不碎者為上調製法研粉用之半夏鑑別法粒大而圓色白皮純淨者佳品也質硬皮呈褐色者下品也其帶赤色或黑色者大抵系腐過者調製法浸於水內夏令三小時冬令一夜待其水氣已入內部取出之置於籠中俟其外面已干以右手執小刀左手持半夏以拇指之指尖爪為加減切為薄薄之圓板狀就日光中曬乾之半夏系六陳之一以用陳品為上昔人非經三年決不使用半夏曲是用生半夏洗淨土氣更在熱湯中洗滌六七次去其黏滑之物入於臼中加生薑十分之一以去其土氣搗合為扁板狀經過一二晝夜然後就日光中曬乾貯之處方之藥味中尚有一種半夏薑湯泡者即以半夏入薑湯中泡之是也乳香鑑別法淡黃色透明體圓之粒狀似玉似乳頭者良品也色褐而形如不整之塊狀者下品也調製法用藥研細碎用之煎藥可用其碎者練藥散藥丸藥等可用其粉末稍稍炒用之肉豆蔻鑑別法外面淡褐色呈卵圓形若橫斷之其中可見大理石狀之褐色紋理其實質白而大且重未經蟲食者為上又長形之物亦好調製法火後切之昔時調製之法是用紙包裹一度浸入水中榨去其水氣埋於熱灰中炮碎用之亦有用小麥粉和醋塗於肉豆蔻外面入於炭火中煨之頃之取出去其所塗之小麥粉乘溫碎粉用者亦有冷後碎之者肉桂鑑別法皮厚重里多紫赤色之油分味辛甘稍稍有香氣者佳品也裡面帶黑味或帶朽狀無辛味者無用皮雖薄而色相甚佳辛味強者亦可用調製法以火炙之吹出其油分然後就木板切之肉蓯蓉鑑別法肥大而軟者為上舶來之物曾用鹽漬如系白色或呈紅黃色者上品也黑色者下品也忍冬鑑別法其色青青而有新氣者為上其主以用莖為正當葉則亦可使用然在今日則大抵將葉與莖並用一處焉調製法就原産地切碎用之人中白鑑別法小便所滴瀝而成之白塊曬過二三年者為上調製法就瓦上燒煏為灰成粉人中黃製法將竹筒除去其皮入甘草末於其中塞其兩頭之口冬令投入糞缸立春取出清水洗其外表懸掛於通風日蔭之處待其干後取出甘草末曝於日光中干之人參鑑別法黃色而呈潤澤形如紡錘身份甚重者上等品也細而硬或色白如新物者劣品也參鬚系參之鬚根集於一處者以嵩高而無粉屑者為上斷人參系小參之碎斷品集於一處者此宜視其大小而定其高下又有高麗參者分淡黃白色之白參與半透映飴褐色之紅參二種其形如一株直立之桔梗亦有紡錘形者亦有中部肥胖者其品質分上品中品下品普通品四種日本人分為元品特天甲乙並甲乙四種每一品中更分為上下二品合為八品分兩重者價值昂分量輕者價值廉其分類法白參每六兩中量重者二十枚順次而下為三十枚四十枚五十枚六十枚八十枚一百枚百二十枚最細者百四十枚計共十種紅參每六兩中最重者二十枚順次而下為三十枚四十枚五十枚六十枚白參之原料比紅參為良故若價廉之白參必系變態物廣東人參有芍藥狀人形狀圓狀三種現今之參大抵如芍藥狀外部呈灰褐色中部大兩端細而長日本御種人參如桔梗狀者分宇記宙記天記鳳記仁記義記禮記智記信記順記十種肥胖者分春記夏記秋記冬記四種均所以區別其品之高下示其價之廉昂也善處人參者必貯以錫罐密封其口則色相好而不失其潤其貯於袋中者往往因接觸大氣變為硬質枯而不潤且易為蟲蝕故貯袋之參為防蟲蝕計不得不加樟腦調製法火炙就木板切之本草綱目啓蒙圖譜云人參分朝鮮漢和三品而以朝鮮為上其形不拘大小色如飴肉透徹潤實味甘微帶苦嘗後餘味甚真參之分類為孩兒參有雌雄之形態面目俱備單參形圓中無碎小之根細長可插入蘆頭單參鬚掗扒根之末端白梢皮白肉潔白如粉味甚甘掗扒尾部不屈之物肉段頭段梢段斷參之末尾下品人參也廣東人參即芍藥狀或人形狀根圓竹節人參橫根如竹鞭圓根人參白色有臊氣味至苦竹節人參鬚直根人參御種人參蒲黃鑑別法微有特異之臭全質一體呈深黃色者為最佳物若惡物則色相甚淡或濃淡不均令人望之而生嫌調製法使用生者宜篩去其塵垢補血止血用者宜炒牡丹皮鑑別法從秋至冬之根除其木心而干之外面呈赤褐色內部呈淡紅色香氣強大而長者為上調製法水浸二三小時取出後切為一二分厚鋪於席上就日光中曬乾之牡蠣鑑別法粗大之殼碎之其呈灰褐色者名鼠牡蠣白色者名白牡蠣以新者為上調製法再在石臼中搗之使粗大之物粉碎篩去其粉末再除去其大塊而用其直徑約二三分之不整形之碎片用其粉末者則可儘量搗舂或用火燒後以水注之硼砂鑑別法白色透明之大結晶品上品也此白硼砂與透明硼砂自昔本系藥用今則藥局方面大體不用而用帶暗青色呈蠟狀之物此種硼砂實系劣品祗可用為接合金屬於藥無效也芒硝鑑別法其名稱依形狀及精粗而異其未精練者混有塵埃及土質呈黃白色之粗朴塊曰朴硝一稱灰芒硝朴硝一斤加清水一升煮後再行結晶此係精品大者如稜柱狀名曰馬牙硝或稱英硝其細如芒針而結晶者曰芒硝其凝結於器底之結晶塊謂之盆硝置於風之流通所在風化後而成白粉者曰風化硝朴硝者芒硝馬牙硝之總稱也調製法結晶之物可以配劑煎劑之處方中所用之芒硝其初須先將他藥煎煮就其濾液中再加芒硝更行煎煮沸騰後服用之萹蓄鑑別法葉與莖而無土氣與根且色澤新者為佳調製法就木板切之土鱉甲鑑別法大須有四寸許甲黑而有光澤內面白色處處現有乾血之汙點而色澤新者為上有種下等之品甲面往往塗以黑墨更塗以他種動物之血此係無用之品宜十分注意調製法火炙角制之杜仲鑑別法外面呈淡褐色內面呈紫褐色從大木之上剝其木皮厚而扁平脂氣多而潤橫折之兩手拉出去見有無數銀色之絲有如綿狀者佳品也其採自嫩木者皮薄而絲少故劣調製法縱五分橫切之童便採取法十二歲以下健康之兒童排泄之尿棄去其始初與終了之部分取其中間放出之品為上冬蟲鑑別法干後形態尚大且形態完全有新之色澤者為上形態碎亂或已經蟲蝕者無用調製法儘量煎之練藥用者用火干之研為藥粉冬瓜子鑑別法邊緣肥厚色白有新氣者為上小而帶暗色色相惡者無用調製法依配劑之情形制之冬瓜皮鑑別法剝冬瓜之皮干之冬瓜宜大色宜帶青且宜新鮮若已變黃色或帶暗色者無用調製法碎用之或稍稍以水潤之切為二分左右之碎片亦可冬葵子鑑別法冬葵之實有灰黑色之光澤而微帶甘味無藁屑等雜入其間身份重者為佳此亦有僞造之品系用大之錢葵子製成調製法稍稍炒用之螳螂鑑別法淡褐色之大蟲而帶新氣者為上蟲已碎斷者無用調製法去其頭與腳火炙成粉用之燈心草鑑別法有生草熟草二種藥用者宜生草待其生干之時去心用之若蒸過之後而去其心者謂之熟草此宜用於燈火不能為藥用矣調製法燒為灰用之橙皮鑑別法將已熟之橙四剖之剝離其皮其皮外面帶褐黃色內白且形甚大有新氣象而無蟲蝕傷者為佳外皮帶暗黑色或已切為細片者往往無用調製法火後切之其調製時浸於水中十五分鐘取出後待水分滴去而皮質覺軟即用薄刃除去其內面之海綿組織須細細挑括干後使用之獨活鑑別法本品與羌活同近來中國産者甚少大抵系日本産形似鳩杖其質輕虛外皮呈暗褐色密布線狀之橫紋橫斷面之直徑有七分至一寸者謂馬皮羌活其下部分歧之根亦有橫紋且成皺溝菟絲子鑑別法呈黃色無軸有新意者為上經過年月後往往變為褐色此係無用品調製法今已隨便使用從前用法必須酒浸三日取出炒後方用地龍鑑別法陰乾後長而未折無土氣形態嵩高者為上調製法就木板切之地黃鑑別法地黃有三種生地黃形如小指呈黃赤色肥而多潤且長者為上瘠而小且乾燥者無用此宜貯於日蔭之處埋置於細砂地上不宜注水乾地黃採集於冬期就日光中曬乾之一般人認此為生地黃者誤也其外皮呈灰色內部為紫褐色味甘而稍苦肥大者為上熟地黃系蒸乾之品色如漆品有光澤味甘大者為良品刀地黃集合許多幹地黃所切下之短而斷之品系屬下等品地膚子鑑別法青白色而有新之色澤者為上調製法日光中乾燥後稍稍炒用之處方之藥則用酒浸疝氣者研粉服用之地骨皮鑑別法黃褐色之大者其根皮如卷狀者為佳調製法水浸一夜就木板切之地榆鑑別法外皮暗褐色內部呈白色表面有皺溝中部肥厚兩端細長根直而有新氣者為上形不整而多鬚根者無用調製法火熏之減去其有效分就木板切之豬苓鑑別法皮黑而有光澤內部白者為上瘠而小或內面帶淡紅色或淡黑色或淡赭色者下品也調製法水浸約四小時切成五分左右之圓板狀縱約橫薄之二成切就後就日光乾燥之竹葉鑑別法用淡竹或干竹所生之葉為上調製法將生葉之尖即葉尖與葉腳用剪刀剪為五分長就木板切後加入煎藥中竹瀝鑑別法味淡甘者為上品味苦而辛者必採自苦竹下品也不宜用採取之法將活之淡竹去其節縱四分之一就火上熏之其液汁從兩端滴出以器物受貯之調製法煎藥服用者以少加為是竹茹鑑別法活之淡竹除去其節削去其青之外皮然後用小刀薄薄括其內青皮調製法不妨多用又處方中往往有上劑以生薑三片竹茹一團水煎服云云所謂一團自古並無一定惟大約在兩錢左右丁香鑑別法色赤褐肥厚富油分身分重投水即沉下者上品也瘦而細身分輕虛者無用調製法水浸切之知母鑑別法似石菖蒲根有黃色之毛馬大潤澤味覺苦甘者稱為真知母良品也調製法用水洗後暫時放置用小刀切為二分左右之三角塊或火炙切之沉香鑑別法色黑而潤富脂肪味辛質硬而重火熏之有香氣者為上夾新之木或輕虛之物或無香氣者或味不甘者或味酸者或色白而全無香氣者均無用之物也從箱中輸來之品有種種之區別從沉香之中心選出其佳良之部分此種物品稱為中木上品也其次為節木即木之有節者香氣較薄又有細長如竹葉者更有扁平者甚且有極細如爪者市場中有削沉香者此係削之於無花果樹更有包裝就之舶來品外標太泥或院尼者香氣甚薄非上品也其色黑而有光澤者尚可暹邏有名茶木者木地與色相如普通之木而香氣極充足制線香用之奇南香脂氣油氣均甚多且黑而有光澤比之普通沉香勝萬萬云調製法用火炙溫在未冷時切之其兩方用手掌摩揉一二次以去其微塵為是椿根皮鑑別法選其淡褐色之厚而大皮片內面有布眼無土氣者為佳調製法火灸後切之陳倉米鑑別法選其色澤已失未經蟲蝕未曾黴臭者為佳調製法稍稍炒用之從前處方有陳倉米黃土炒者即用赤土炒之之謂陳皮鑑別法古稱陳橘皮現今大體用蜜柑之皮其外皮呈赤褐色裡面白色肌細而美者為上若系青黑者系未熟之柑皮暗黑色者系腐爛之皮均屬無用之物考陳皮之原意非古舊之謂乃指成熟而言此應注意調製法選天晴之日浸於水中一小時使水分浸透取出後乘軟用兩手扯碎之即以大眼篩篩去其大者再用細眼篩篩去其砂就日光曬乾之雨天則宜蒸使不生黴若一經生黴則色相變黑矣若加香薷散將陳皮用水洗過以防其黴白亦佳藜蘆鑑別法我國古有蔥管藜蘆其莖根形同蔥株外部有黑棕櫚之毛被之下端叢生多數之細長根此係上品其後祗有蒜藜蘆其根如葫蘆大之圓塊而缺被覆之棕櫚毛調製法去其鬚根用米泔汁煮軟之切薄搗碎不可加水將其白濁之液靜置之待其沉澱物沉於器底取出曝露於日光中俟其干後用之緑豆鑑別法粒大如眼身分重而無砂氣者為上調製法用篩除去砂分不去皮兩手碎之去皮則塞氣也良薑鑑別法有赤褐色之色相而肥者良品也其兩端之斷面切口肥厚者為上色帶黑或形細者下品也調製法用火炙薄薄切之從前之法切薄後將筷箸尖醮胡麻油炒之龍眼肉鑑別法皮殼褐色形如圓球粒大皮殼不破內部之果肉多潤者如玉龍眼肉上品也倘果肉乾固或有黴生而酸或粒小者無用也又有肉龍眼肉系無殼之果肉其表面滑澤有縱之條紋此又另一種物矣調製法將玉龍眼肉破其殼取其果肉加於煎藥中或丸藥中龍膽鑑別法呈淡褐黃色有無數長之鬚根者為上倘系暗褐色或鬚根少者無用調製法以水洗之暫時放置然後切之龍腦龍骨鑑別法棲息於前世紀動物之骨骼朽化如化石其形狀與枯骨無甚差異內部髓質走失松疏而有多數之細孔或者往往於空洞之內包藏結晶稱之曰龍骨其他尚有如齒形者名曰龍齒藥用以色白質軟以舌舐之即黏著者為佳黃色或暗黑色者無用調製法現今大抵細碎用之往昔則將龍骨與鹽同入土器中炒後除鹽用之又有用炭火燒後暫時放置地上冷後研碎用之者遠志鑑別法大遠志如鬼腕肥而長大者為上細而帶暗色且朽者無用肉遠志系拔自木心之肉質部粗大者為上其他概系劣品調製法細者切為一分半長大者切為一分長黃柏鑑別法皮厚色深黃味苦者為良品皮薄或色淡黃或形如老木或皮脆者無用粉末注以水捏之有黏性者良品也少黏者稱二號黃柏末無用調製法火炙壓為五分長之細線黃連鑑別法形狀似殭蠶皮部呈淡緑色內部呈深黃色味極苦者上等品也此稱為殭蠶黃連或稱加賀黃連又有名丹波黃連者形狀色相均與前同惟瘠而小耳其質堅實內部呈黃色苦味極多者亦為上品又有制黃連者其細根上混以黃粉與糊更有毛黃連者系黃連之細須劣品也調製法用水浸軟壓薄切之黃芩鑑別法形狀大如柴胡肉重外皮茶褐色其內部有黃緑色之朽中不空而丸軸苦者為上形極肥大而內部有黑朽俗云餡氣或成片者下等品也肥大之老根及朽而中空虛者謂之枯芩又名片芩其有粗皮附著者名附皮黃芩去其粗皮而留其內部鮮黃色之部分謂之磨黃芩調製法浸於水中夏令一日冬令二日取出切為二分長成為大片再切為縱二三條之斷片水浸後色帶青味黃蓍鑑別法大如棒而柔外部呈淡褐色或黃褐色內部呈黃白色味甘而有香氣者名綿黃蓍上品也內部之色淡而質甚緻密者亦屬良品質極硬或分兩歧或過柔者劣品也調製法水浸後用小刀切為骰子大小之塊火炙後壓之黃精鑑別法根莖似白芨似老薑節高肉肥大不分歧者為上調製法火炙軟切之王不留行鑑別法黑色已成熟身分重者為上調製法浸於水中三四小時取出蒸之其次用火焙乾之海金沙鑑別法用指頭捻之覺砂砂有聲而不黏於指者為上黏著者僞品也調製法忌火艾葉鑑別法無藁埃土氣陳者為上調製法取其葉揉之火炙之或研粉海人草鑑別法色青青而軟有毛茸附著蔓長無砂石及貝殼者為上蔓短而砂氣多毛茸粗帶淡灰色或帶黑色或帶褐色者無用故上等品有青柳印等圖章焉調製法現今大多用火暖干之手揉而落其附著之砂氣切二三分長海人草逢雨天則濕故宜密貯於木箱內葛根鑑別法就原産地割為片日光中曬乾之謂之生干或稱板葛根其成小角塊者曰方銼總之以色白而新者為上調製法小角者已可用板葛根應在釜中蒸過切為四五條片蒸之釜與水宜避鐵器厚朴鑑別法外部呈紫黑色內部有縱紋皮極厚質甚緻密爪之不易氣味強微覺苦有新意者為上陳久者皮薄者呈淡褐色者均無用調製法浸於水中夏令一日冬令三日取出後成二三分之小角塊皮之厚者以平角塊為主薑製者削去粗皮切為細塊每厚朴一斗入生薑汁一升浸之然後日乾或火干之炒黑之藁本鑑別法我中國産者有無數之細根香氣甚高此為真品鬚根似前胡放川芎之香氣者系川芎冒沖無用調製法火後切之合歡皮鑑別法大之皮片為上調製法削去粗皮火後切之香附子鑑別法兩端尖而中央部肥厚長五六分之塊根去其赤褐色之皮內部白成大粒之物者為上然通例無純白色必略帶微紅色成粒者名粒香附子碎者名砂利香附子又香附子之內部本系白色掘取後就日光中干之其呈紅色者系充分干之徵調製法浸於水中夏令一夜冬令二三日壓薄縱平切之用兩手碎之亦佳香薷鑑別法十月霜後採其長刀形者陳貯之調製法穗用兩手碎之蛤粉鑑別法陳久者為上調製法在炭火上燒為粉此物不可為煎藥用夏枯草鑑別法褐色之花入袋覺嵩高者為上若系暗褐色或碎散者無用調製法花用兩手扯碎之訶子鑑別法有六七條之稜線似四君子皮殼黑內部之實多味澀者為上調製法與四君子同何首烏鑑別法中國産成連珠狀之根剖切之其橫斷面有淡紅色之花紋表面有縱五條之深溝大者為上非連珠狀者系日本産無用又其色相為淡紅色者稱雄何首烏灰白色者稱雌何首烏調製法水浸一夜軟後削為小角塊或切方之莪蒁鑑別法略同蓬莪蒁大而肥內部佳良有新意者為良小而瘠且陳久者無用調製法火炙乘暖用小刀切為小角塊水浸而切者須浸一星期橄欖鑑別法坊間之品大抵用鹽汁過其表面呈肝褐色處處有皺溝以橢圓形之大者為上調製法切去其兩端之尖切片用之有時亦可炒用甘草鑑別法其大如鞭其皮薄帶赤味其破折面有鮮黃色質堅而長正直而味甘者為良俗稱南京甘草根肥大皮部粗內部呈淡黃色者為福州甘草應選其根無大小味甘內部黑而不朽或茶褐色不變者色相雖佳而過細者無用其直徑有一寸左右形態緊札橫斷面有鮮明之紋理者李時珍稱為粉草以甘草一束用左手握其株處撳於臺上右手持刀向下將株斜切為若干段每段大約一尺六寸自大至小選分為五六種色相佳而大者或內部之短者或色相惡者各自束為一卷兩端用紅絲扎之下端包入紙袋調製法火炙後切為三四分厚或用小刀斜薄切之煎藥之加味者以兩手碎之為上水浸者不甚穩妥甘松鑑別法蝦甘松恰如小蝦之形頭多如葉之須主藥用其次名葉甘松多香氣故線香之香料大抵用之如蘆頭之苗者最劣名土甘松因附著無數之土屑故名又葉甘松者即系集蝦甘松落下之葉者也調製法浸於水中兩手細剖之然後就日光中曬乾之甘遂鑑別法似麥門冬而稍長如指頭大外面有赤斑內部白色緊接如連珠狀者為佳外面白色或者黑色或者有須者無用調製法火後壓而切之乾薑鑑別法肥而大外面呈灰白色極有辛味火炙後切斷之則內部呈飴色色相如鱉甲者為上調製法用火炙軟後切之乾漆鑑別法漆在桶中自然乾枯成為深褐色之物燒之有漆氣者為佳調製法打碎後用無煙之火炒之薏苡仁鑑別法形似玉蜀黍而稍小去其褐衣現出白質色白而粒大者上品也無褐衣者殼薄仁多亦屬良品調製法去砂使用之大黃鑑別法厚一二寸如圓板狀或馬蹄狀肥大而帶深黃色者名紫地錦文其質輕以鋸割之內面呈黃色者曰頭大黃細長而瘠形如芋者名小天大黃次品也色黑而極硬重者最惡之品也我國自昔之大黃必經長年月日待其充分乾枯稍帶澀氣服用後不起腹痛此係珍品其色相為黃色看去實質甚輕大抵經過蟲蝕者也又有新山大黃者外觀極似土耳其大黃極下等之品也新制劑記中雲大黃有二種木片大黃有斜線筋紋而乾者佳性也一種純如連珠之相系色惡而輕虛不潤者最下品也日本品不將莖與葉合與中國貨有同樣香氣者最良壯人用之以其藥性強故也亦可合為外貼膏藥此外有羊蹄大黃土大黃二種羊蹄大黃多生於河原田野葉莖花俱青子如蕎麥而輕又名野大黃土大黃莖味酸莖葉花實根皆似赤色又名山大黃調製法火炙後切為一分厚又有浸水三四十分鐘而後切者不穩妥
