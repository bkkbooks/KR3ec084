body:
  text: 芫花鑑別法從開花前之蕾直至開花花形不亂苦味強香氣高者為佳普通有用鼠麴草以亂真者因其無香氣故極易分別宜十分注意調製法有劇烈之毒一度醋煮後浸入水中一夜以減其毒力然後就日光中曬乾用之芫菁鑑別法系荷蘭人運來之物較之斑貓狹而且小大抵長六七分闊一分余似螢而頭不赤全體及翅鞘皆呈緑色而放金光日本産者名青斑貓較小呈紺青色亦放光輝此物以臭氣強而新者為佳調製法去頭與腳粉用之牽牛子鑑別法本品有白與黑二種白色價高而效能則黑色為峻速粒大而干有新氣入水即沉者為上調製法兩手拍去其微塵篩除其粉用之玄參鑑別法外皮淡褐色內部黑色潤而肥大者為上根短而集為塊狀或形小者無用調製法火軟後割為二縱片更橫切之浮萍鑑別法葉大而裡面呈紫色者為上此物採於舊曆七月左右入籠干之調製法隨取用之浮石鑑別法色淡而輕者為上調製法搗碎為粉調水用之伏龍肝鑑別法採自灶底中央之燒土以陳舊者為貴此物可治妊娠之嘔吐與半夏並用之有效屢用屢驗調製法打碎用之前人用水化之茯苓鑑別法皮黑色內部白色質緻密硬而重者良品也內部帶暗色或過於脆軟或過於硬者無用調製法角制之物普通稱山制採時乘軟切為骰子形調劑時用之山出有皮之茯苓待其充分乾燥後剝去其粗皮在其實質緻密之部用小刀削之此名削茯苓削成之物如過粗雜再行切之附子鑑別法國産附子大者如雞卵小者類薤白而以大者為貴十六枚一斤者最上等其肥而無角者稱天雄小者苟內部色白者亦佳日本産者稱白川附子其形狀與國産同但氣味峻烈內部之白稍帶暗色調製法生用者甚少大抵用紙包包後埋於熱灰中煨後去其皮切之又有先四剖之水浸一日取出後待其稍干然後火熏而切之者附子入熱水童便火熱等能減毒性昔者往往大量用之胡蘆巴鑑別法色相紫色而重者為上調製法稍稍炒用之琥珀鑑別法深紅色透明之物曰血透或曰金珀良品也其次曰銀珀色稍淡下品者曰蠟珀色淡黃最下等者呈黑色焉調製法粉碎用之胡黃連鑑別法似楊之枯枝心黑外部為黃色試折之則見有如煙之粉飛出者為佳調製法銼之或火後切之胡桃仁鑑別法有光澤且有褐色之子皮內部之仁色白而肥厚且有新意者為佳瘦瘠者或呈暗黑者以及破碎者劣品也已經蟲蝕者無用調製法本品為染白髮使黑之用火上焦後成炭用之胡麻油鑑別法本品有麻油清油兩種而其白鬍麻之油稱白麻油黑胡麻之油稱烏麻油不熬而生榨之色相極淡成金黃色有香氣者名生油熬後榨之香油色呈褐黃放香味無二膏等之藥膏即用此香油者也胡椒鑑別法粒大而辛味強有新氣者為上調製法暫浸於水後取出滴去其水分兩手切之牛蒡子鑑別法採牛蒡之種子為治咽喉痛之效藥本品以成熟而新者為佳越年者無用調製法水洗後暫時放置水中待充分濕後從兩手碎之牛黃鑑別法牛黃色如薑黃呈深黃色破之內部亦為深黃色有小白點從外部至內部有重疊之片將少許入口中碎之唾液潤軟後咽下覺催嘔之力甚強者為上又其重量輕者良品也重者下品也奧國牛黃色甚濃價值最高其次為玉牛黃形圓或純三角色稍帶赤其次為天竺牛黃比較的形大而成碎片之物極劣者俗稱四六牛黃細而碎十分中有六分混入贋品日本牛黃名真牛黃成暗色之球形調製法在乳鉢中研用之虎骨鑑別法有頭骨頸骨脛骨等之稱以色黃者為上調製法細細打碎除其內部之髓質酒或醋浸之火炙之研粉用虎杖根鑑別法似褐色之柳根而輕者為上調製法火後切之牛膝鑑別法淡黃色長大而肥實質軟者為上帶暗色之物或短而堅者無用調製法先去莖次火其根元壓後切為長二分之物浸於水中者色相惡紅花鑑別法本品古名紅藍花藥用以鮮紅色極新之物為佳越年貨而變為暗紅色者無用調製法兩手扯碎用之五倍子鑑別法帶黃褐色之光澤形大者為佳小者碎者無用調製法打碎後除去其中蟲糞研粉用之五靈脂鑑別法五靈脂有二種良品者狀如糞呈漆黑色長二寸成粒似鼠糞有光澤兩端尖而圓者也下品者如鐵糞成鐵黑色之黏塊調製法研粉用之五味子鑑別法表面有皺紋呈紫黑色之大粒有甘味者良品也又有朝鮮五味子者表面呈紅色以濕與白之粉一吹之即見白色市中稱為白五味子然蒸後其紅故故云調製法兩手細銼皮核均堪應用穀精草鑑別法常生於水溜之處及山麓始終有水之場所以青而有新氣者為佳調製法棄根切之蜈蚣鑑別法足肥而足數少者良品也日本産者足細而數多劣品也調製法去頭足銼之巨勝子鑑別法黑胡麻之實有光澤而重者為佳調製法水洗干後稍加小豆炒之小豆可以加減頓飯時從火取下去小豆貯之古文錢鑑別法經過有年之古者為佳調製法先浸於醋中次在炭火上燒後碎用之吳茱萸鑑別法粒小呈黑色有辛味苦味者為佳經年而辛味已脫者無用日本産者粒大倍於華産氣味烈經年者為佳稱為真吳茱萸調製法從前水洗後就日光中干後用之或用兩手扯碎之亦可鉛丹鑑別法鉛丹俗稱也真正之丹即辰砂與粉也丹之帶黃色者稱黃丹其品類有乘久丹長吉丹光明丹勝吉丹市兵衛丹等以其製造方法與製造人而異其名稱其中以乘久丹為最上用於膏藥黏性強而色相良雖長年貯之亦不變脆貴真膏萬金膏等均用此物若放置一日乾燥後其膏藥面折合時決不固附引離時亦特備離之特性以嵩高度少而身分重者為佳調製法從昔用水調用今則隨便用之然煮膏藥者必預將黃丹曝於日光中干後用之延胡索鑑別法其形類似半夏粒圓而大色黃者為佳粒小而身分輕虛色相不良或帶白味者無用而對蟲蝕之物亦不可不檢去調製法浸於水中五六小時取出待其表面水分已干用小刀削為小塊或以兩手碎之鳶尾根鑑別法外部為黃褐色肥而新者為上陳而變暗色者有青芽者均無用調製法火後切之葶藶子鑑別法有苦葶藶甜葶藶二種苦葶藶苦而辛辣其種已絶目下祗有甜葶藶形小而呈黃赤色調製法入焙爐焙之從前則隔紙炒之鐵粉鑑別法放金屬狀之光輝為灰白色之粉細者研為粉末若大如指頭或呈黑灰色者無用又如已經酸化帶有褐色而現古意者亦佳鉤藤鉤鑑別法攀繞植物之鉤刺其藤細而帶紫色多嫩鉤者為上用其鉤者效力加倍調製法用剪刀剪為二三分長或以兩手細切之此時最宜注意者即鉤之蔓生者務須除去尖頭亦須除去天竹黃鑑別法如象牙色或淺黃白色之細之物粉狀如灰塊之形狀又半透映如白蠟者為上呈黑色或黑褐色而不透映者無用調製法用其粉天南星鑑別法圓而肥內部白者為上調製法浸於水中二三日壓之切為小角其切法始初切為三分厚之圓板狀其次縱橫切為小角或平角牛膽南星即系用天南星之粉以牛膽包裹干之使用之際除皮炒之天瓜粉鑑別法天瓜粉系從瓜呂根上採取之澱粉滑澤而微細純白色者為上將匙插入見其黏著者無用本品市場中假者極多大抵用浮粉或片栗制之天麻鑑別法大者如瓜如足黃白色透明而如瓜者良品也似羊角而不透映者無用藥用須知書云其根干色黃白者曰羊角天麻以其色如羊角故名非形如羊角也調製法火炙暖後見柔二片縱斷之或薄切之阿剌伯橡皮鑑別法白色透明之粒狀者為良品呈淡黃色者為次品褐色之塊片及碎片者劣品也調製法以應用粉末為主其調製之法選晴天在日光下充分乾燥之使用水車或發動機之動力在石臼中粉碎而成有光澤純白色之粉末如日光不充分乾燥則其粉末必微帶赤色罌粟殼鑑別法淡褐色而未破者為良調製法去其蘆頭與其內部之白之部分及隔壁蜜制者浸於蜜與水之等分液中亦有以火焙之者亞麻仁鑑別法有光澤色褐形大者為佳呈暗色者或有土氣者或有藁屑混入者均無用阿魏鑑別法淡黃而色褐者為上暗色或帶黑味者無用調製法入丸藥者以藥研研為粉浸置於酒中軟後取出乘濕與他藥煉合為丸藥阿膠鑑別法牛皮或驢皮所制之膠長三寸余闊一寸余厚一分左右透明者為佳品呈黃黑色長三寸至五分之棒狀者為次品總之凡黃色琥珀色者透明者暗赤色而透明者夏不軟化者均屬良品黑而無光澤者無用調製法切小入炮烙用極弱之緩火炒之而用其粉惟其數宜少多則相互固結焉阿仙藥鑑別法市場所賣者以骰子形者為多色呈淡褐質輕而脆少澀味有甘味者為佳呈暗紫褐色質軟而重澀味強者不良品也有形長如棒者有薄而呈圓板之狀者阿仙藥有古舊狀態枯而輕色相淡少有澀味者為良澀味強而帶紫黑者或為不整形之塊片者系屬極下等品多用作染料不能作藥用安息香鑑別法松脂者呈褐黃色者良品也褐色中帶黑或白而有光澤者系次品色黑如茶者下品也調製法在暖酒中入安息香經二三次之煮沸沉於底取出之入水中見其堅且脆者為合取出干後若仍有黏氣者再續煮之犀角鑑別法黑而有光澤微見彎曲長七八寸乃至一尺余之角株扁大基底之直徑有五六寸周邊灰白色中心及上部呈黑色者稱烏犀角尖端良好而基底白者劣品也劈之其縱筋粗在手中覺滑者真品也高二三寸如黑之盆山者亦佳長一尺五六寸株之直徑三四寸縱之筋緻密者名水犀角可以為烏犀角之代用品銼後有犀角之氣切為薄片向日光中照之其透明之點狀粗大者有光澤而色黑者烏犀角也透明之點狀細無光澤而色暗者水犀角也調製法將犀角倒豎從其基底十字切之其時將其一片置於金網之火焰所奔出之劇烈炭火上此時急以小刀新之小刀無用就熱之根元切之火弱者或熱之時間過長必損其光澤但如烈火後急切銼之其色相與光澤亦不能良從前犀角在配伍處方時預先將鮫皮磨為粉於服煎藥時吞下之本草序例云凡湯中用麝香犀角羚羊角牛黃蒲黃丹砂須熟末如粉臨服內湯中攪令調和服之西瓜皮鑑別法薄剝之皮有光澤不碎而帶青味者為佳暗色之物或蟲蝕者無用調製法兩手切之西國米鑑別法白色無砂有新意者為上調製法隨意用之柴胡鑑別法形狀如鼠尾有細長之根皮為赭褐色內部呈淡褐色味苦而微有良之香氣者為佳其他直根而不分歧者內部之色不朽而淡者大者不選為是有油者瘠而小者無用調製法浸於水中用石壓之經三四小時取出切之細辛鑑別法根極細長四五寸外部淡褐色內部白色辛味恰如山椒氣味烈而新者為佳經年後辛味已失者無用又有名土細辛者杜衡也調製法浸於水中取出後切為一分長之物蔥白鑑別法白根多而肥者為佳調製法洗去其土氣切而棄其青之部分著根之處切為一寸長生入煎藥中桑白皮鑑別法楮之皮外皮呈黃赤色內面呈白色有柔韌之薄皮者為上此名附皮桑白以其白曬過者名曬桑白以色白者價昂堪為藥用近來常有用柳之皮曬粉為白者宜注意調製法火炙軟壓之切為二分長或用手銼去微塵亦佳桑寄生鑑別法莖圓而有分歧之叉枝葉二枚採其所生於叉狀上者有黃色之葉而似長質厚而堅者為真品調製法切之桑螵蛸鑑別法黃褐色之舟狀松疏之物者為上黃褐色而不似舟狀者及小者皆無用調製法火後切之皂角刺鑑別法採之已久貯藏法良色青青而新者為有效調製法切去尖端火後細切之皂角子鑑別法扁平而呈褐色其邊緣有破眼形大者為佳無破眼者色青者大而不扁平者非良物也調製法碎後炒為粉用之皂莢鑑別法有豬牙皂角與肥皂莢二種豬牙皂角長二三寸闊三分左右向一旁彎曲肥皂莢長四五寸闊五分左右子實黑約計三四粒以實少者為上品日本皂莢呈赤褐色長一尺余闊一寸左右少彎曲莢中多厚肉而有黏性者為上調製法棄其外面之黑皮而以內面之白皮火焙之用藥研之為粉又萬病回春中風條中有通關散者其藥味中有牙皂去皮弦云云此即指除去皂莢上之黑皮與筋而言草果鑑別法鈍三稜之果殼形大內部之實亦大而帶茶褐色香氣強味辛烈者為上小而呈汙黑色者無用又草果有草豆蔻肉豆蔻白豆蔻之區別用藥須知書云草果皮大仁大草豆蔻之仁比草果之仁為小藥之下品也肉豆蔻之仁如檳榔子香氣佳味苦白豆蔻者去草豆蔻之皮之物也此四種葉皆似良薑故不易辨云調製法去皮將實火後兩手碎之草豆蔻鑑別法大抵除其果殼色淡而有光澤形大者為佳暗褐色者破碎者不良之物也調製法破子殼為二棄其殼而取其中之仁入於布袋用手強揉去其皮膜稍稍炒後兩手碎之蒼耳草鑑別法陰乾其莖與葉色青青而新者為佳調製法刀切之或兩手碎之蒼朮鑑別法外皮呈茶褐色橫斷面呈黃白色處處有赤褐色之油點氣味苦辛芳烈肥而重多膏者名曰古蒼上品也無膏者名新蒼又名新山蒼朮下品也切後放置有白衣者無用調製法火炙後切之新蒼又名焚蒼梅雨之時燃火薰之可除室內濕氣相思子鑑別法形狀似赤小豆質堅色一半黑一半赤黑赤判然有光澤而鮮明者為上黑赤不能判然分明者或變為鮮紅色者紅紫色者劣品也三稜鑑別法色帶淡灰質重下端有鉛筆之削口其稜全體恰如鮒者形小者為佳色呈暗色者無用本品生於隨處水澤中其名稱因草莖起三稜故調製法浸於水中夏令五日冬令七日壓而切之山奈鑑別法色白肥厚而新者為良調製法水浸三四小時取出入籠滴其水分兩手碎之山藥鑑別法除其粗皮色白而滑質重而形大者為上帶青黑色者或蟲蝕者無用調製法火後壓切為小角或研為粉末供配伍散藥用山楂子鑑別法粒大而呈赤色者為上暗黑色者碎而小者無用調製法浸於水中數小時取出置籠中滴下其水分後以兩手碎之在急要之時間不浸水中即用兩手碎之亦可山椒鑑別法成熟之果破其殼為兩片呈赤褐色形大味辛香氣高而新者為上經過年月變為暗紫黑色而氣味已脫者果殼之閉者品之種子多者無用調製法以前之法除其果梗及黑皮用其分為二片之果殼今則用兩手碎之山茱萸鑑別法色相為紫黑色有酸味與澀味色澤潤者為上陳久者肉少者無用調製法從前除核用之今則兩手碎之山梔子鑑別法皮薄有七條乃至九條之稜線圓而呈赤黃色者上品也此名圓梔子其較大者形細長呈黃色者名黃梔子次品也其採取於久雨連綿之際色黑或腐朽者或陳久者均無用調製法兩手碎之或水浸後切之酸棗仁鑑別法扁圓形而赤色之仁粒大者為上陳久者已變暗赤色者劣品也又其初色相甚佳因沾吸濕氣日光中曬乾後亦要變為暗赤色宜十分注意調製法兩手剔去其微塵用之蠶沙鑑別法蒼黑色呈顆粒狀之乾燥蠶屎表面有六條之深縱溝其聲砂砂者為上調製法即用或研粉用之龜甲鑑別法以活龜之甲背為上死後所取者無用又有腹甲者俗稱龜板云調製法火後切之從前用酒醋塗後就焙乾再塗以酒醋再行焙乾如此五六回然後研粉用之杏仁鑑別法上端尖尾端圓如心臟形扁平而肥厚仁白粒大者為上調製法與桃仁同法用小刀橫切為二薑黃鑑別法肥而圓內面帶黃赤色者為良細長者薄而如竹刀者非良品也調製法火炙暖壓而薄切之羌活鑑別法自古以來羌活即系獨活之論為數甚多就今日考之未可即為定論近頃市場之羌活色帶光澤外皮呈紫黑色縱有皺紋彎曲如蛇形狀隔一二寸有節橫斷面之中心有白色之木心其周圍皮部呈暗褐色此其一種也又有並無光澤呈黑褐色外皮處處有點狀之隆起物無節橫斷面之皮部白色上有褐色之油腺者此又一種也要之種類雖繁總以有光澤而外皮呈紫黑色有節者為上近來出數甚少日本産者外部微帶青色內部呈白色大者如小指形如棒此為最上等其大者苟質地緻密亦佳調製法火暖後大者從縱間切斷之為二條或四條再以小刀切為二分長製劑用者以兩手剔去其微塵菊花鑑別法秋間開花之際採集甘菊之花而陰乾之以黃色多瓣色極新嵩高者為上野菊花或苦薏等苦味之花或陳久之花均不佳調製法去萼離瓣用之桔梗鑑別法形狀似沙參少分歧之枝根外皮褐色內部白色有滋味大而一棵直立者為上此名帶皮桔梗其曬後呈純白色者稱曬桔梗調製法浸於水中十五六分時間壓而切之或火炙後切之枳殼鑑別法形不過大呈黑青色者為上調製法水洗入籠滴去其水分乘其質軟時切之枳實鑑別法大如新式棋子肉外泛皮部厚帶青黑色有苦味辛味火炙切後其切口呈淡小豆色有鱉甲狀之光澤者為上如切口呈暗黑色或呈青色或呈黃色形小如無患子者次品也價值以陳者為昂極新之品切口現青色稍稍經過月日者切口呈黃色價亦不昂若經過年月而切口呈暗黑色者劣品也調製法皮面向上肉質面向下火炙之在其香氣出時試切之切時覺甚便當者即全部一一薄切之橘皮鑑別法黃橘之皮呈黃色肌細有苦味形狀良者上品也陳久者劣品也調製法以兩手剔其微塵用之金銀花鑑別法花瓣之上端呈黃褐色基部呈赤褐色乾者為上成粉者有藁屑者無用調製法隨意用之榆白皮鑑別法去粗糙之外皮而用其內皮為佳調製法遇濕氣則損品質宜火後切之熊膽鑑別法選色黑而有光澤有焦臭性感濃苦味試以白色之茶碗盛清水一杯以半粒胡麻大之熊膽置入碗中見其浮於水面旋轉迅速而不休止在回旋之際漸漸溶小終於忽然消失者真品也旋轉之時回旋遲緩或暫時停止或雖旋轉迅速而不悉溶或浮於水面而不旋轉或浮在水面時水底下有一道之黃線者均劣品也因除熊膽外其他之獸膽亦能旋轉但不及真正熊膽之旋轉之速耳又可以清水盛於他器中在其水面上撒以微塵而以米粒大之熊膽滴下見微塵在其左右如絲如線下於水底其線不散者亦真品也其味純苦而無雜味者良品也初入口甘而後覺苦或初不苦而後苦或苦而淡者或帶甘味者或其味覺不快者皆系劣品惟初甘後苦之物雖屬劣品但無良品可選時亦可以用現今市場中價格之高下即視味之良否而定其色系漆黑色而放光澤者為佳品否則劣品也其氣味有焦臭氣者良品也有血腥之氣味或帶腐敗之臭氣者下等品也又坊間有琥珀狀熊膽者呈透明之黃赤色有光澤極苦而無雜味在水面上回轉迅速入口即溶而不黏此亦良品也熊膽之真偽凡富於經驗之人雖置無數之物品於前一見即能辨明總之贋物之外皮必帶煤色之黑色內面黑色枯而無光其質堅硬或味雖苦而覺淡或帶不快之味此以黃連黃柏當藥等煉成之者也又有雖苦而其中雜有細小之碎片者亦贋品也調製法水溶解溫湯煎服之丸藥以水溶化去其皮與滓用之不能入煎劑中煎服密陀僧鑑別法以淡黃色之銀密陀僧為良品帶赤黃色之金密陀僧為下品均可供藥用鉛色銅色之密陀僧無用調製法紙包以鐵槌細碎後入鍋注水煮之然後就日光中曬乾貯之密蒙花鑑別法淡褐黃色花序不碎味甘者為良調製法兩手碎之明礬鑑別法不帶白色之粉霜成透明而大之結晶者為上此名透明明礬其重疊如塔狀者名塔狀明礬礬石即燒明礬之物結晶後除其水而成枯礬巴石燒明礬等名稱者也取其色白而嵩高分量輕者為上帶暗色者或碎而已吸引濕氣者無用雌黃鑑別法石雌黃有如金之黃色有光而軟者為上帶黑色者無用調製法臼中搗粉用之蒺藜子鑑別法黃褐色之菱形質重者為上調製法刺之焦者炒後在藥研邊緣研去其刺頭壓切之如藥用之目的為恢復盲者視力則宜研粉用之食後服用一方寸鐘乳石鑑別法形狀如指色相如飴稍帶赤味中央有孔通者為上等過長者或質粗者或內部無孔者無用又其物恰如烏之羽莖透明而中空虛質輕者稱鵝毛管石亦上品也調製法現今用石臼搗碎使用於煎劑中從前據本草序例云凡用鐘乳石等諸石以玉槌水研三日三夜漂練務令極細常山鑑別法小者採小木之根呈黃色者為上其葉稱蜀漆又名土常山另有一種其葉稱甘茶可為甘味之劑從前往往附加於醬油中凡呈暗黑色之收縮干葉而無屑片味甘而多新氣者為上調製法火後切之紫菀鑑別法外部紫色內部白色有無數之細長根附著軟而能彎曲者為上調製法火後切之紫根鑑別法外部紫黑色內部有白色之肉即皮部厚者為良皮部薄者僅可作染料之用紫蘇葉鑑別法俗稱縮緬紫蘇或稱花紫蘇者其表裡均呈紫色在未開花前採集其葉之大者陰乾之以香氣高軸大或無屑片混合者為良陳久者採集時片面青而他面紫者兩面均青者無用調製法水洗入籠滴去水分軟化後壓而切為二三分長紫石英鑑別法呈紫色成透映之結晶形形正而大者為良調製法火燒赤取出浸於醋中水溶之使君子鑑別法兩端尖有五條稜線色黑褐形大內部呈白色有油氣而色新者為上調製法壓為二三分之厚切之麝香鑑別法全形者稱臍麝香其直徑大約一寸亦有稍長而大者其外面有多多之毛之皮包之色帶淡褐此上等也毛白者下品也形正圓者扁平者壓其外面覺內容充實不硬不軟有抵抗力取出其內容覺有乾燥之細末香氣強烈比之普通麝香香氣之刺戟強者為良麝香以香氣之強弱為證香氣少者不良品也內容軟而潤者不良品也取出其內容有皮者名皮麝香調製法切開其皮取出內容乳鉢細研後入小瓶中儲之商陸鑑別法山牛蒡之根切二三寸長薄如板狀乾燥之以灰白色而幅廣大者為佳帶暗色者無用調製法火炙縱切其幅為五分如浸於水中而切之者其色大變變為不良松蘿鑑別法生時色青白干後成白色形長者為佳調製法切之松脂鑑別法黃色或淡黃褐色塊大者為上成粉而帶暗色者無用調製法研粉用之升麻鑑別法外皮紫黑色內部有淡褐色之羅紋肥大者為上從此根所生之莖其附著之葉如秋海棠而有鋸齒一如鬼臉者名鬼臉升麻形瘠而小外皮呈黑色內部為青白色者名雞骨升麻次品也調製法水浸一日半待其充分軟後壓而薄切之其大者先縱切為二條或四條更橫切之菖蒲根鑑別法從前用石菖蒲之根現今市場中悉用端午日白菖蒲之根形大外皮青色內部白色香氣強而新者為上調製法壓而薄切之生薑鑑別法發育肥大內部有白味味辛而香氣好色新之母薑為上帶暗色者細而瘠者根者均無用調製法火炙暖壓而用小刀平平薄切之或兩手碎之在處方之終往往有生薑幾片云云每片以若干重若干大古來均無一定從奇效醫術載一片之重為二分五釐以來世間亦未有人提出異議者青皮鑑別法表面呈暗青色青色強裡面海綿組織之部分呈白色者氣味新者為上調製法浸於水中取出入籠暫時放置後切為一二分芍藥鑑別法冬令掘其根不去其皮就日光中乾燥之者名生干所謂赤芍者即其大如指肥而硬外皮帶淡紅色內部呈白色之物也以形長如棒味苦而澀者為良形細者短折者內部變褐色者蟲蝕者均無用所謂白芍者在冬令採掘其根時即除去其粗皮投入沸湯中煮沸之其湯呈黑色取出後曬乾之物也其效力比之赤芍較弱調製法置在鐵網之上下用火暖之軟後壓切為一分左右之薄赤小豆鑑別法藥用者須貨品極新粒小呈暗黑色有光澤者為上陳久者蟲蝕者無去腫病之水氣之力者也調製法盡煎用之不能銼入赤石脂鑑別法有角性之不整塊易碎以爪磨之能放光澤以舌砥之無土臭之味內部呈淡紅色者為良外部淡紅色內部白色者無用白石脂則宜色白者為是調製法現今細碎水溶之從前碎後浸於醋中火燒後水溶之蛇退皮鑑別法銀白色之光澤有圓筒狀菲薄之皮膜曝於雨露者為上調製法炒為粉或煏為灰用之蛇骨鑑別法所謂蛇骨者系古代之大樹埋沒於地中木心殘剩為化石者也形狀如大蛇叩之發礦音者為上調製法研為粉用為撒布於損傷之部車前葉鑑別法帶青味之大葉嵩高者為上調製法輕輕注以如露之水軟後除其葉柄疊而切之草前子鑑別法黑褐色而有光澤之長橢圓形之種子質重而能沉於水中者為上帶褐色而無光澤者無用調製法稍稍炒粉用之蛇床子鑑別法似小茴而較短小味辛類荊芥有香氣者名真蛇床子良品也然一般之蛇床子形如米粒有毛茸此竊衣子也調製法真蛇床子稍稍炒用之有毛茸者日光中乾燥後置臼中搗去其毛炒後用之沙參鑑別法長圓錐形外部淡黃色內部呈白色上部肥大之部分直徑有六七分者為上帶暗色之老朽根或形細者無用調製法水洗後取出置籠中軟後切之戎鹽鑑別法從前在青州産談青色骰子形之青鹽堪供藥用其後以荷蘭人輸入無色透映之光明鹽代之亦有用夾雜酸化鐵之淡紅色之桃花者調製法隨意用之縮砂鑑別法除其果殼呈暗褐色形橢圓而大者為上色暗黑而易碎者次品也現今市場中之物品大部分無色相表面往往塗以白粉者又有附皮縮砂者以形大內部有果實之集團者為良調製法兩手細剖之辰砂鑑別法形大質重鮮硃色者名大辰砂上品也細者劣品也調製法研磨磨為粉末水溶之辰砂不加入煎劑中俟他藥煎煮後將漉濾濾其液衝入煎藥汁中服用之辛夷鑑別法正月間開花前之花蕾內部充實形大者為良調製法除其外部之苞及毛茸用之秦艽鑑別法有羅紋交相糾繞狀如細絲色黑味苦者為良日本産者系另一種之植物羅紋直上並不交糾大而長者為良調製法洗淨後浸於水中十分鐘切為小角塊真珠鑑別法藥鋪中販賣者有下列諸種惟日本人能辨之伊勢真珠藥用亦可為裝飾用形正圓而粒大發銀色之光輝者為上金色者次之水戶真珠藥用者屬於上等之部形極圓白如銀色有光澤者為上志摩真珠供普通藥用色白粒小以極圓者為上粒大而色帶黑味者不正圓者價廉此外尚有小芥子琉球北海湖水等名稱云調製法絹包入豆腐之中煮後搗碎為粉萆茇鑑別法黑褐色粒狀之果實集團無數有一寸左右長之復果香氣與辛味均烈色新者為良細小者無用調製法湯中充分洗過切後陰乾之萆薢鑑別法質軟者為上又原植物之莖無刺者則其根軟刺之根色白而硬者無用調製法去皮火後切之枇杷葉鑑別法採取枇杷樹上極大之葉陰乾後以帶色青而新者為上調製法生葉切為直二分左右如葉已乾燥者宜注以如露如霧之水暫時放置然後切之在盛夏暑氣時用之蓽澄茄鑑別法暗黑色形大而新者為良調製法浸於酒中蒸後用之白豆蔻鑑別法此有除殼與不除殼二種市場所售大抵為帶殼者以圓而肥色淡者為良帶暗色之果殼殼已破者無用調製法去果殼與粉稍稍炒用之白檀鑑別法白檀有三種頂上者名老山檀木大而直兩端之切面以黑紙貼之表面有塗以朱者質脆而香氣強者為老山之特徵最劣者名新記亦稱普通白檀香氣弱而感甘味質有黏氣與老山之香氣完全不同又有一種不屬新記亦非老山品位介於兩者之中者名地門亦名間山又有印白檀者谷稱和檀系日本人取茂木而假造之者也調製法用刀劈之白檀劈出後凡黃褐色而多油氣香氣強者為上品淡黃色而油氣少者易碎而香氣弱者且容易燒過者劣品也白蘞鑑別法如烏梅而圓大如雞卵外皮紫黑色內部白色味苦者為良調製法火後切之白芨鑑別法肥而色白者為良調製法水洗後壓而切之白殭蠶鑑別法色白而形直質硬者為良調製法水洗後暫置之待軟將其腹內之絲狀物就口尾抽出之又有水洗後即炒而用之者白芷鑑別法有細長之枝富芳烈之氣味呈純白色而新者為良過大者有蟲穴者無用調製法暫浸於水將細者壓切之大者視其程度斷切為縱二段或四段再行薄切之其極大者橫為三四分長再從縱間薄切之急要之時火後切之本品非常易遭蟲蝕在梅雨季節前即宜用箱密閉儲藏即入樟腦直至秋令為度白朮鑑別法根白而柔者稱三好白朮良品也筋多而堅者名嫩根白朮下品也總之以新者為上凡有蟲穴者陳久而變褐色者均無用又古昔有云頭朮雞腿朮狗頭術諸名稱視其形態而異其命名者也調製法水洗後取出入籠滴去其水分火炙之稍壓而切之又其始即火炙而切之者亦佳處方中有雪白朮者此並非經雪之謂乃甚言其雪白之意也萆麻子鑑別法有銀白色之斑點呈黑褐色橢圓形之種子富有油分質重者為佳調製法去殼稍稍炒用之檳榔子鑑別法形如扁平球有澀味質堅硬者名大腹檳榔子上品也稍長如卵圓之形頭尖者名山高檳榔子次品也總之要外部呈淡褐色內部有白之紋理未經蟲蝕腳部無凹凸之穴者為上調製法火熏暖切之又或削為纏卷若用浸於水中之方法則其色相必損沒藥鑑別法沒藥有二種供藥用之煉沒藥大抵無琥珀之色現今多用似乳香之黃黑色或汙褐色之不整塊物微放香氣味苦無砂石木片等夾雜者為上花沒藥無香氣破折面呈顆粒狀成脆而半管狀之堅塊新鮮者呈淡赤色或赤褐色經過月日從暗褐色變為黑色以新而不碎者為上調製法與乳香同木香鑑別法形態如久曝於雨露之枯骨外面淡褐色內部灰白色硬如角質實質中味苦者為上若內部黑而朽且空虛者多砂利與片者無用調製法浸於水中夏令五六小時冬令一夜取出滴去其水分細細薄切之大者從縱間切為二條或四條更橫切之然後就日光中充分乾燥之用為賣藥之製劑原料者先粗雜切之然後兩手碎之木鱉子鑑別法扁平鈍三角形或橢圓形之種子邊椽呈小半圓形之深深之缺刻形似鱉帶緑色其中仁大者為上調製法除殼稍稍炒後去其油分用之木賊鑑別法淡黃色大而長之物成一束者為上經月陳久或置於日光直射之處變為帶赤色者均不適用調製法切其節火後切為二分長短木通鑑別法皮厚外部黃褐色似黃蓍形棒狀之物橫折面黃白色上有直徑三四分乃至一寸左右車軸狀之紋理縱間有細孔一端吹之他端出氣味苦者為上日本産者形如防己外部有灰色之皮內部有褐色菊花狀之紋理此名帶皮木通去其皮而全有其白者名曬木通已切者名丸木通粗雜之物再以兩手碎之者名押木通大抵直徑有六七分者為佳調製法切後盡配劑用木瓜鑑別法外面赤褐色內面淡褐色形大而無蟲穴者為良暗黑色者無用調製法浸於水中冬令一晝夜半夏令一夜取出放置籠中俟其水分滴去火熏之縱斷為二片更薄切之青黛鑑別法身分輕色呈紫黑者良品也身重而呈黑色者有土砂者無用調製法碎後水溶之去其渣與土砂而後用之青礞石鑑別法礞石有二種色呈青黑打破之其中有白色之銀點火燒之則其中之白點變黃者曰銀礞石此為供藥用之良品色黑而有金星者名金礞石下品也調製法細碎之物加同量之硝石入於炮烙之鍋中且以其他同樣大之鍋覆之其接合處塗以土火燒後放置於冷處冷後以乳鉢研粉水溶之椒目鑑別法色黑而身分重者為良調製法炒為粉用之小豆蔻鑑別法長圓形色純白肥厚皮殼之表面有淺之縱筋香氣高者為上尖端與下端純稜線之部分縱筋尤多又呈暗黃色者皮殼表面之縱筋極深香氣與前大異者劣品也小茴香鑑別法粒大而呈黃褐色有香氣者為是帶暗色之陳久物者無用日本信州産者粒較小而帶青味香氣亦強較諸國産勝矣石膏鑑別法有蠟狀之光澤有白色透明之層之塊片一節之間約二三寸縱間有束針狀之紋理質軟者為上硬者無用調製法石臼中搗碎在篩中篩除其粗大者用之從前調製之法以同樣大之炮烙鍋二隻相合之中入石膏置於火上上置炭火約一時候今二小時除火冷後敷於紙上在土上放置一夜全冷後供藥用全蠍鑑別法小而緊形態完全者為上足已脫離者形亂者下品也乾燥品呈藍青色鹽浸者變淡灰色全蠍以蟲之身體全部完全而名而效力多集於尾部名蠍梢調製法鹽浸之物宜用水充分洗去其鹽分乾燥後火炙剖之硝石鑑別法色白結晶大而不濕者為上帶暗色者細者無用調製法盛於土器中火上熱而溶融之冷後凝結碎用之石葦鑑別法人迹斷絶之山中生於岩石上者為上調製法去其葉背之毛火後切之石決明鑑別法有九穴者名九孔上等品也非九孔者不能供藥用調製法與米泔汁同煮約二小時除去貝外黑之部分碎用之又以水小麥粉捏石決明於其中埋於熱灰中煨後除去小麥粉與外部之黑者粉用之石斛鑑別法用其生於石上之莖質硬根白者為上根黑者生於木上者無用調製法去根火後切之川芎鑑別法球形或長圓形之塊狀根外皮黑褐色內部黃白色形大氣味辛烈者為上調製法火炙軟試切之內部呈黃色如鱉甲之狀半透明者合度矣其大者縱二切或十字切更細切之穿山甲鑑別法褐黑色而有光澤無蟲蝕者為上以剪刀剪開者祗須形大亦可市中有剝甲後長埋地中使皮部腐朽而鱗不變化後日掘出洗去其土氣干曬之其土帶為淡灰色者調製法火炙暖而軟之細切之用藥研充分研為細粉以一小匙衝於開水中服之可以促乳之分泌蟬退鑑別法蟬之脫殼故又稱蟬蛻民間之中耳炎者服用之集其附著於上者色呈茶褐有光澤具備全形者為良品帶土氣者下品也調製法浸於湯中洗去其土氣去其頭足翅等火後粉用之旋覆花鑑別法黃褐色而有新意者為良調製法用其花瓣前胡鑑別法外部黑色內部黃白色緊札而身長者良品也極肥大者過細者無用調製法洗去土氣壓而切之
